<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15 Melanie</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Great+Vibes&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="invitacion">

    <div class="decoracion">♛</div>

    <p class="frase">
      Hay momentos que solo se viven<br>
      una vez...<br>
      Te invito a compartir conmigo<br>
      una noche inolvidable.
    </p>

    <div class="linea">♡</div>

    <div class="datos">
      <p>🗓️ Sábado 15 de agosto de 2026</p>
      <p>🕙 22:00 hs</p>
      <p>📍 Salón de Eventos AMSA</p>
      <p>📌 Gobernador Gregores 970</p>
    </div>

    <div class="linea">♡</div>

    <h2>FALTAN</h2>

    <div id="contador" class="contador">
      <div><span id="dias">00</span><small>DÍAS</small></div>
      <div><span id="horas">00</span><small>HS</small></div>
      <div><span id="minutos">00</span><small>MIN</small></div>
      <div><span id="segundos">00</span><small>SEG</small></div>
    </div>

    <a class="boton" href="https://wa.me/5492974933730?text=Confirmo%20mi%20asistencia%20a%20los%2015%20de%20Melanie" target="_blank">
       Confirmar asistencia
    </a>

    <a class="boton secundario" href="https://maps.google.com/?q=Gobernador+Gregores+970" target="_blank">
       Cómo llegar
    </a>

    <div class="firma">
      <div class="numero">15</div>
      <div class="nombre">Melanie</div>
    </div>

  </section>

  <script>
    const fechaEvento = new Date("August 15, 2026 22:00:00").getTime();

    setInterval(function () {
      const ahora = new Date().getTime();
      const distancia = fechaEvento - ahora;

      const dias = Math.floor(distancia / (1000 * 60 * 60 * 24));
      const horas = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutos = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
      const segundos = Math.floor((distancia % (1000 * 60)) / 1000);

      document.getElementById("dias").innerHTML = dias;
      document.getElementById("horas").innerHTML = horas;
      document.getElementById("minutos").innerHTML = minutos;
      document.getElementById("segundos").innerHTML = segundos;
    }, 1000);
  </script>

</body>
</html>
