<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>15 Años de Melanie</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body>

<section class="hero">
  <div class="card">

    <div class="sparkles"></div>

    <p class="intro">Estás invitado a celebrar mis</p>

    <div class="numero">15</div>
    <div class="anos">Años</div>

    <h1>Melanie</h1>

    <p class="frase">
      Hay momentos que solo se viven una vez...<br>
      Te invito a compartir conmigo una noche inolvidable.
    </p>

    <div class="info">
      <p>📅 Sábado 15 de agosto de 2026</p>
      <p>🕙 22:00 hs</p>
      <p>📍 Salón de Eventos AMSA</p>
      <p>📌 Gobernador Gregores 970</p>
    </div>

    <div class="contador">
      <p>Faltan</p>
      <div id="cuenta">Cargando...</div>
    </div>

    <div class="botones">
      <a class="boton principal" href="https://forms.gle/izKcubHBGhyqqTuy9" target="_blank">
        Confirmar asistencia
      </a>

      <a class="boton secundario" href="https://www.google.com/maps/search/?api=1&query=Gobernador%20Gregores%20970%20AMSA" target="_blank">
        Cómo llegar
      </a>
    </div>

  </div>
</section>

<script>
const evento = new Date(2026, 7, 15, 22, 0, 0);

function actualizarCuenta() {
  const ahora = new Date();
  const diferencia = evento - ahora;

  if (diferencia <= 0) {
    document.getElementById("cuenta").innerHTML = "¡Llegó el gran día!";
    return;
  }

  const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
  const horas = Math.floor((diferencia / (1000 * 60 * 60)) % 24);
  const minutos = Math.floor((diferencia / (1000 * 60)) % 60);
  const segundos = Math.floor((diferencia / 1000) % 60);

  document.getElementById("cuenta").innerHTML =
    dias + " días · " + horas + " hs · " + minutos + " min · " + segundos + " seg";
}

actualizarCuenta();
setInterval(actualizarCuenta, 1000);
</script>
</body>
</html>
